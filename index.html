<!DOCTYPE html>
<html lang="es" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Mapa emocional interactivo de España. Visualiza el estado emocional de las principales ciudades según las noticias del momento.">
    <title>Emotional Weather Map · España</title>

    <!-- SYX Design System — Emotional Map Theme  -->
    <link rel="stylesheet" href="syx-main--emotional-map/css/styles-emotional-map.css">

    <!-- Leaflet.js -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>

    <!-- GSAP (animations) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>

    <!-- Map custom styles -->
    <style>
        /* ================================================
       MAP APPLICATION STYLES
       All values reference SYX semantic tokens
       to ensure emotion theme cascade applies correctly
    ================================================ */

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            background: var(--semantic-color-bg-primary, #0d1117);
            transition: background 0.6s ease;
        }

        /* AMBIENCE LAYER — full-screen atmospheric gradient overlay */
        .ambience-layer {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: radial-gradient(ellipse at 50% 80%,
                    var(--emotional-ambience-glow, transparent) 0%,
                    var(--emotional-ambience-color-start, transparent) 40%,
                    var(--emotional-ambience-color-end, transparent) 100%);
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .ambience-layer.is-active {
            opacity: 1;
        }

        /* MAP CONTAINER */
        .map-container {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        #map {
            width: 100%;
            height: 100%;
            background: var(--semantic-color-bg-primary, #0d1117);
        }

        /* Leaflet tiles dark filter for dark theme */
        .leaflet-tile {
            filter: brightness(0.4) saturate(0.3) hue-rotate(190deg);
            transition: filter 0.6s ease;
        }

        /* UI OVERLAY */
        .map-ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            background: var(--semantic-color-bg-primary, #0d1117);
            border-bottom: 1px solid var(--semantic-color-border-subtle, rgba(255, 255, 255, 0.08));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: color-mix(in oklch, var(--semantic-color-bg-primary, #0d1117) 85%, transparent);
            transition: background 0.6s ease, border-color 0.6s ease;
        }

        .map-title {
            font-family: var(--semantic-font-family-primary, 'Inter', system-ui, sans-serif);
            font-size: 1rem;
            font-weight: 600;
            color: var(--semantic-color-text-primary, #f0f6fc);
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .map-title__icon {
            font-size: 1.25rem;
        }

        .map-status {
            font-family: var(--semantic-font-family-primary, 'Inter', system-ui, sans-serif);
            font-size: 0.8125rem;
            color: var(--semantic-color-text-tertiary, #7d8590);
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        .map-status__dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--semantic-color-primary, #4d7fff);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.4;
                transform: scale(0.8);
            }
        }

        /* EMOTION POPUP — shown on marker click */
        .emotion-popup {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(120%);
            z-index: 20;
            min-width: 280px;
            max-width: 420px;
            width: calc(100vw - 3rem);
            background: var(--emotional-popup-bg, rgba(20, 24, 32, 0.96));
            border: 1px solid var(--emotional-popup-border, rgba(77, 127, 255, 0.4));
            border-radius: 1rem;
            box-shadow: var(--emotional-popup-shadow, 0 8px 40px rgba(0, 0, 0, 0.5));
            padding: 1.25rem 1.5rem;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            opacity: 0;
            pointer-events: none;
            transition:
                background 0.4s ease,
                border-color 0.4s ease,
                box-shadow 0.4s ease;
        }

        .emotion-popup.is-open {
            pointer-events: all;
        }

        .popup-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.875rem;
        }

        .popup-emoji {
            font-size: 2rem;
            line-height: 1;
            flex-shrink: 0;
        }

        .popup-city {
            font-family: var(--semantic-font-family-primary, 'Inter', system-ui, sans-serif);
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--semantic-color-text-primary, #f0f6fc);
            line-height: 1.2;
        }

        .popup-emotion-tag {
            display: inline-flex;
            align-items: center;
            padding: 0.125rem 0.625rem;
            border-radius: 9999px;
            font-size: 0.6875rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--semantic-color-text-primary, #f0f6fc);
            background: var(--semantic-color-primary, #4d7fff);
            opacity: 0.9;
            margin-top: 0.25rem;
        }

        .popup-headline {
            font-family: var(--semantic-font-family-primary, 'Inter', system-ui, sans-serif);
            font-size: 0.9375rem;
            line-height: 1.5;
            color: var(--semantic-color-text-secondary, #b1bac4);
            margin-bottom: 0.75rem;
        }

        .popup-source {
            font-size: 0.75rem;
            color: var(--semantic-color-text-tertiary, #7d8590);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .popup-date {
            font-size: 0.6875rem;
            color: var(--semantic-color-text-tertiary, #7d8590);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .popup-link {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--semantic-color-primary, #4d7fff);
            text-decoration: none;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            border: 1px solid var(--semantic-color-primary, #4d7fff);
            opacity: 0.9;
            transition: opacity 0.2s ease, background 0.2s ease;
            margin-left: auto;
        }

        .popup-link:hover {
            opacity: 1;
            background: color-mix(in oklch, var(--semantic-color-primary, #4d7fff) 15%, transparent);
        }

        .popup-link.is-hidden {
            display: none;
        }

        /* LIVE INDICATOR */
        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.625rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--semantic-color-text-tertiary, #7d8590);
            padding: 0.125rem 0.5rem;
            border-radius: 9999px;
            border: 1px solid var(--semantic-color-border-subtle, rgba(255, 255, 255, 0.1));
            transition: color 0.4s ease, border-color 0.4s ease;
        }

        .live-badge.is-loading {
            color: oklch(0.8 0.15 90);
            border-color: oklch(0.8 0.15 90);
        }

        .live-badge.is-live {
            color: oklch(0.8 0.18 150);
            border-color: oklch(0.8 0.18 150);
        }

        .live-badge__dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: currentColor;
        }

        .live-badge.is-loading .live-badge__dot {
            animation: pulse-dot 1s ease-in-out infinite;
        }

        .popup-close {
            position: absolute;
            top: 0.75rem;
            right: 0.875rem;
            background: none;
            border: none;
            color: var(--semantic-color-text-tertiary, #7d8590);
            cursor: pointer;
            font-size: 1.25rem;
            line-height: 1;
            padding: 0.25rem;
            border-radius: 4px;
            transition: color 0.2s ease, background 0.2s ease;
        }

        .popup-close:hover {
            color: var(--semantic-color-text-primary, #f0f6fc);
            background: var(--semantic-color-bg-secondary, rgba(255, 255, 255, 0.08));
        }

        /* CITY MARKER — custom Leaflet DivIcon */
        .city-marker {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transform-origin: bottom center;
            transition: transform 0.2s ease;
        }

        .city-marker__emoji {
            font-size: 2rem;
            line-height: 1;
            filter: drop-shadow(0 2px 8px var(--emotional-marker-glow, rgba(77, 127, 255, 0.4)));
            transition: filter 0.4s ease;
            animation: emoji-float 2.2s ease-in-out infinite;
            will-change: transform;
        }

        @keyframes emoji-float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-5px);
            }
        }

        .city-marker__ring {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid var(--emotional-marker-ring, rgba(77, 127, 255, 0.6));
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -60%);
            pointer-events: none;
            opacity: 0.18;
            animation: ring-idle 3s ease-in-out infinite;
            transition: border-color 0.4s ease;
        }

        @keyframes ring-idle {

            0%,
            100% {
                transform: translate(-50%, -60%) scale(1);
                opacity: 0.18;
            }

            50% {
                transform: translate(-50%, -60%) scale(1.35);
                opacity: 0;
            }
        }

        .city-marker__label {
            font-family: var(--semantic-font-family-primary, 'Inter', system-ui, sans-serif);
            font-size: 0.625rem;
            font-weight: 600;
            color: var(--semantic-color-text-primary, #f0f6fc);
            background: color-mix(in oklch, var(--semantic-color-bg-primary, #0d1117) 85%, transparent);
            padding: 0.125rem 0.375rem;
            border-radius: 4px;
            margin-top: 0.125rem;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s ease;
            backdrop-filter: blur(8px);
        }

        .city-marker:hover .city-marker__label,
        .city-marker:focus-visible .city-marker__label {
            opacity: 1;
        }

        .city-marker__ring.is-active {
            opacity: 1;
        }

        /* LEGEND */
        .emotion-legend {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 10;
            background: color-mix(in oklch, var(--semantic-color-bg-primary, #0d1117) 88%, transparent);
            border: 1px solid var(--semantic-color-border-subtle, rgba(255, 255, 255, 0.08));
            border-radius: 0.75rem;
            padding: 0.875rem 1rem;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: background 0.6s ease;
        }

        .legend-title {
            font-family: var(--semantic-font-family-primary, 'Inter', system-ui, sans-serif);
            font-size: 0.6875rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--semantic-color-text-tertiary, #7d8590);
            margin-bottom: 0.625rem;
        }

        .legend-items {
            display: flex;
            flex-direction: column;
            gap: 0.3125rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: var(--semantic-font-family-primary, 'Inter', system-ui, sans-serif);
            font-size: 0.75rem;
            color: var(--semantic-color-text-secondary, #b1bac4);
        }

        /* LOADING state */
        .map-loading {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--semantic-color-bg-primary, #0d1117);
            gap: 1.5rem;
            transition: opacity 0.5s ease;
        }

        .map-loading.is-hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-emoji {
            font-size: 4rem;
            animation: float 2s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-12px);
            }
        }

        .loading-text {
            font-family: var(--semantic-font-family-primary, 'Inter', system-ui, sans-serif);
            font-size: 1rem;
            color: var(--semantic-color-text-secondary, #b1bac4);
            letter-spacing: 0.02em;
        }

        /* REDUCED MOTION */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Leaflet attribution */
        .leaflet-control-attribution {
            background: color-mix(in oklch, var(--semantic-color-bg-primary, #0d1117) 90%, transparent) !important;
            color: var(--semantic-color-text-tertiary, #7d8590) !important;
            font-size: 0.625rem !important;
            backdrop-filter: blur(8px) !important;
        }

        .leaflet-control-attribution a {
            color: var(--semantic-color-text-secondary, #b1bac4) !important;
        }

        .leaflet-control-zoom a {
            background: color-mix(in oklch, var(--semantic-color-bg-secondary, #161b22) 90%, transparent) !important;
            color: var(--semantic-color-text-primary, #f0f6fc) !important;
            border-color: var(--semantic-color-border-default, rgba(255, 255, 255, 0.12)) !important;
        }
    </style>
</head>

<!-- Default theme: neutral dark cartographic -->

<body data-emotion-theme="neutral">

    <!-- LOADING SCREEN -->
    <div class="map-loading" id="mapLoading" role="status" aria-label="Cargando mapa emocional">
        <div class="loading-emoji" aria-hidden="true">🗺️</div>
        <div class="loading-text">Cargando mapa emocional...</div>
    </div>

    <!-- ATMOSPHERIC AMBIENCE LAYER -->
    <div class="ambience-layer" id="ambienceLayer" aria-hidden="true"></div>

    <!-- MAP CONTAINER -->
    <div class="map-container" aria-label="Mapa interactivo de España" role="region">
        <div id="map"></div>
    </div>

    <!-- TOP NAV BAR -->
    <header class="map-ui" role="banner">
        <div class="map-title">
            <span class="map-title__icon" aria-hidden="true">🌦️</span>
            <span>Emotional Weather Map · España</span>
        </div>
        <div style="display:flex;align-items:center;gap:0.75rem;">
            <span class="live-badge" id="liveBadge" aria-live="polite">
                <span class="live-badge__dot" aria-hidden="true"></span>
                <span id="liveBadgeText">Seed</span>
            </span>
            <div class="map-status" aria-live="polite" aria-atomic="true" id="emotionStatus">
                <span class="map-status__dot" aria-hidden="true"></span>
                <span id="statusText">Hover a city</span>
            </div>
        </div>
    </header>

    <!-- EMOTION POPUP (shown on marker click) -->
    <div class="emotion-popup" id="emotionPopup" role="dialog" aria-modal="false"
        aria-label="Información emocional de la ciudad" aria-hidden="true">
        <button class="popup-close" id="popupClose" aria-label="Cerrar popup">✕</button>
        <div class="popup-header">
            <span class="popup-emoji" id="popupEmoji" aria-hidden="true">😐</span>
            <div>
                <div class="popup-city" id="popupCity">Ciudad</div>
                <span class="popup-emotion-tag" id="popupEmotionTag">neutral</span>
            </div>
        </div>
        <div class="popup-date" id="popupDate" style="display:none">
            <span aria-hidden="true">🗓️</span>
            <span id="popupDateText"></span>
        </div>
        <p class="popup-headline" id="popupHeadline">Cargando información...</p>
        <div class="popup-source" id="popupSource">
            <span aria-hidden="true">📰</span>
            <span>Google News</span>
            <a class="popup-link is-hidden" id="popupLink" href="#" target="_blank" rel="noopener noreferrer">
                <span aria-hidden="true">↗️</span> Ver noticia
            </a>
        </div>
    </div>

    <!-- EMOTION LEGEND -->
    <aside class="emotion-legend" aria-label="Leyenda de emociones">
        <div class="legend-title">Emoción domintante</div>
        <div class="legend-items">
            <div class="legend-item"><span aria-hidden="true">😡</span> Ira</div>
            <div class="legend-item"><span aria-hidden="true">😢</span> Tristeza</div>
            <div class="legend-item"><span aria-hidden="true">😱</span> Miedo</div>
            <div class="legend-item"><span aria-hidden="true">😀</span> Alegría</div>
            <div class="legend-item"><span aria-hidden="true">😲</span> Sorpresa</div>
            <div class="legend-item"><span aria-hidden="true">🤢</span> Asco</div>
        </div>
    </aside>

    <!-- DATA — loaded as globals, works abriendo index.html directamente -->
    <script src="data/cities-spain.js"></script>
    <script src="data/emotions-spain.js"></script>

    <!-- LIVE FEED FETCHER (parallel RSS fetch, 30-min cache) -->
    <script src="scripts/fetch-live-emotions.js"></script>

    <!-- MAP CONTROLLER -->
    <script src="scripts/map-controller.js" defer></script>

</body>

</html>
